<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alihamento de fundo na vertical</title>
    <style>
        section#Container{
            background-image: url(imagens/);
            position: relative;
            height: 95vh;
            background-color: purple;
            PADDING: 10px;
        }

        article#Conteudo{

            position: absolute;
            height: 200px;
            width: 400px;
            background-color: yellow;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <section id="Container">

        <article id="Conteudo"></article>

    </section>
</body>
</html>
